<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tela search</title>
<style>
  :root {
    --fg: #1a1a1a; --muted: #6b7280; --bg: #ffffff; --border: #e5e7eb;
    --accent: #4f46e5; --card-bg: #ffffff; --card-hover: #f9fafb;
    --mark-bg: #fef08a; --mark-fg: #1a1a1a;
  }
  @media (prefers-color-scheme: dark) {
    :root { --fg: #e5e7eb; --muted: #9ca3af; --bg: #111317; --border: #2a2f3a;
            --accent: #818cf8; --card-bg: #161922; --card-hover: #1c2027;
            --mark-bg: #5b4d12; --mark-fg: #fde68a; }
  }
  html[data-theme="dark"] {
    --fg: #e5e7eb; --muted: #9ca3af; --bg: #111317; --border: #2a2f3a;
    --accent: #818cf8; --card-bg: #161922; --card-hover: #1c2027;
    --mark-bg: #5b4d12; --mark-fg: #fde68a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; color: var(--fg); background: var(--bg);
    font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .wrap { padding: 16px 20px; max-width: 760px; }
  .list { display: flex; flex-direction: column; gap: 10px; }
  .result {
    display: block; text-decoration: none; color: inherit;
    border: 1px solid var(--border); border-radius: 10px; background: var(--card-bg);
    padding: 12px 14px; transition: background .12s ease, border-color .12s ease;
  }
  .result:hover { background: var(--card-hover); border-color: var(--accent); }
  .crumb { font-size: 12px; color: var(--muted); margin: 0 0 3px; line-height: 1.4;
           word-break: break-word; }
  .crumb .sep { padding: 0 4px; opacity: .7; }
  .r-title { font-size: 15px; font-weight: 650; margin: 0 0 5px; line-height: 1.35; }
  a.result:hover .r-title { color: var(--accent); }
  .snippet { font-size: 14px; color: var(--muted); margin: 0; line-height: 1.5;
             word-wrap: break-word; }
  .snippet mark { background: var(--mark-bg); color: var(--mark-fg); border-radius: 3px;
                  padding: 0 2px; }
  .empty { color: var(--muted); font-style: italic; padding: 8px 0; }
  .tela-by { display: flex; align-items: center; gap: 6px; margin-top: 14px;
             padding-top: 10px; border-top: 1px solid var(--border);
             color: var(--muted); font-size: 12px; font-weight: 600; letter-spacing: -0.01em; }
  .tela-by svg { width: 15px; height: 15px; border-radius: 4px; display: block; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="list" id="list"></div>
    <div class="tela-by" aria-label="tela">
      <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="512" height="512" rx="112" fill="#4f46e5"/>
        <g transform="translate(-2.5,-38.5)">
          <path fill="#ffffff" d="M150 240 L196 188 Q205 178 218 178 H356 Q378 178 366 200 L332 240 Q325 250 312 250 H162 Q140 250 150 240 Z"/>
          <path fill="#ffffff" d="M238 250 H296 Q300 250 300 268 V396 Q300 414 281 410 L245 402 Q226 398 226 380 V272 Q226 252 238 250 Z"/>
          <path fill="#1e1b4b" fill-opacity="0.4" d="M250 250 H312 Q325 250 332 240 L304 270 Q297 278 297 290 V324 Z"/>
        </g>
      </svg>
      tela
    </div>
  </div>

<!--TELA_BRIDGE-->
<script>
  // ---- safe rendering -----------------------------------------------------
  // Escape ALL html first. Because we only ever inject tags we generate (never
  // raw user html), this is XSS-safe even though results are user content.
  const esc = (s) => String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

  // Snippet may carry <mark>…</mark> highlight tags. Escape the whole string,
  // then re-allow ONLY <mark>/</mark> by unescaping those exact sequences back
  // to real tags. Everything else stays inert escaped text.
  function renderSnippet(s) {
    return esc(s)
      .replace(/&lt;mark&gt;/g, "<mark>")
      .replace(/&lt;\/mark&gt;/g, "</mark>");
  }

  const isHttp = (u) => /^https?:\/\//i.test(u || "");

  function render(data) {
    data = data || {};
    const results = Array.isArray(data.results) ? data.results : [];
    const list = document.getElementById("list");
    list.replaceChildren();

    if (!results.length) {
      const e = document.createElement("p");
      e.className = "empty";
      e.textContent = "No results.";
      list.appendChild(e);
      return;
    }

    for (const r of results) {
      const url = r && r.url ? String(r.url) : "";
      const linked = isHttp(url);
      const card = document.createElement(linked ? "a" : "div");
      card.className = "result";
      if (linked) {
        card.href = url;
        card.rel = "noopener";
        card.addEventListener("click", (e) => {
          e.preventDefault();
          window.__telaWidget.openLink(url);
        });
      }

      const crumb = Array.isArray(r && r.breadcrumb) ? r.breadcrumb.filter(Boolean) : [];
      if (crumb.length) {
        const c = document.createElement("div");
        c.className = "crumb";
        crumb.forEach((part, i) => {
          if (i) { const s = document.createElement("span"); s.className = "sep"; s.textContent = "›"; c.appendChild(s); }
          c.appendChild(document.createTextNode(String(part)));
        });
        card.appendChild(c);
      }

      const title = document.createElement("div");
      title.className = "r-title";
      title.textContent = (r && r.title) ? String(r.title) : "Untitled";
      card.appendChild(title);

      if (r && r.snippet) {
        const sn = document.createElement("p");
        sn.className = "snippet";
        sn.innerHTML = renderSnippet(r.snippet); // escaped + only <mark> re-allowed
        card.appendChild(sn);
      }

      list.appendChild(card);
    }
  }

  // ---- host bridge --------------------------------------------------------
  // window.__telaWidget is provided by the injected bridge.js (ChatGPT + MCP
  // Apps). It replays the latest tool output, so registering here is race-safe.
  window.__telaWidget.onData(render);
</script>
</body>
</html>
