# LiteLLM relief-proxy config — the failover layer in front of tela's AI.
#
# tela points TELA_LLM_URL / TELA_RAG_EMBED_URL at this proxy (http://litellm:4000/v1)
# and calls the virtual models "tela-chat" / "tela-embed". Each virtual model has
# TWO deployments — a PRIMARY and a RELIEF — sharing one model_name, so the router
# load-balances across them and, when the primary errors / times out / is rate-
# limited, retries on the relief and cools the bad one down. That's the whole
# point: when the primary endpoint clogs, traffic shifts automatically.
#
# Everything is env-driven (set in deploy/.env) — no hosts or keys live in this
# committed file. A deployment whose api_base is blank is simply unused, so you
# can run with primary-only and add the relief later.
#
# Metrics: the prometheus callback exposes /metrics on :4000 — request rate,
# latency, tokens, and per-deployment failover/cooldown — scraped into the
# central Grafana (see docs/observability.md). Some per-deployment fallback
# counters are LiteLLM-enterprise; the dashboard degrades to what's exported.

model_list:
  # ── chat / generation (tela TELA_LLM_MODEL=tela-chat) ─────────────────────
  - model_name: tela-chat
    litellm_params:
      model: openai/${TELA_LLM_PRIMARY_MODEL}
      api_base: ${TELA_LLM_PRIMARY_URL}
      api_key: ${TELA_LLM_PRIMARY_KEY}
  - model_name: tela-chat
    litellm_params:
      model: openai/${TELA_LLM_RELIEF_MODEL}
      api_base: ${TELA_LLM_RELIEF_URL}
      api_key: ${TELA_LLM_RELIEF_KEY}

  # ── embeddings (tela TELA_RAG_EMBED_MODEL=tela-embed) ─────────────────────
  - model_name: tela-embed
    litellm_params:
      model: openai/${TELA_EMBED_PRIMARY_MODEL}
      api_base: ${TELA_EMBED_PRIMARY_URL}
      api_key: ${TELA_EMBED_PRIMARY_KEY}
  - model_name: tela-embed
    litellm_params:
      model: openai/${TELA_EMBED_RELIEF_MODEL}
      api_base: ${TELA_EMBED_RELIEF_URL}
      api_key: ${TELA_EMBED_RELIEF_KEY}

router_settings:
  # Send each request to the lowest-latency healthy deployment; on a failure the
  # router retries the other deployment in the same model group (the relief).
  routing_strategy: latency-based-routing
  num_retries: 2
  timeout: 120
  # After this many failures a deployment is cooled down (taken out of rotation)
  # so traffic moves to the relief instead of hammering a clogged endpoint.
  allowed_fails: 2
  cooldown_time: 30

litellm_settings:
  callbacks: ["prometheus"]
  # Tolerate provider-specific params our generic OpenAI calls don't send.
  drop_params: true
  request_timeout: 120

general_settings:
  # Bearer that tela presents (TELA_LLM_TOKEN / TELA_RAG_EMBED_TOKEN). Required.
  master_key: ${LITELLM_MASTER_KEY}
