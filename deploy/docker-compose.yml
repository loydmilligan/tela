name: tela

services:
  backend:
    build:
      context: ../backend
      args:
        # M16.A.1.5 build metadata. Injected into internal/api package vars
        # via -ldflags (see backend/Dockerfile). Surface via GET /api/version
        # — public route the MCP server uses for compat checking.
        VERSION: ${TELA_VERSION:-dev}
        COMMIT: ${TELA_COMMIT:-unknown}
    environment:
      TELA_PUBLIC_BASE_URL: ${TELA_PUBLIC_BASE_URL}
      TELA_SHARE_SECRET:    ${TELA_SHARE_SECRET}
      TELA_API_KEY_SECRET:  ${TELA_API_KEY_SECRET}
      # Org custom domains: stable CNAME target shown to org admins when adding a
      # hostname (defaults to the canonical host). See docs/custom-domains.md.
      TELA_CUSTOM_DOMAIN_TARGET: ${TELA_CUSTOM_DOMAIN_TARGET:-}
      # Postgres DSN. Constructed here from the TELA_PG_* vars (see deploy/.env)
      # so the backend never needs the individual pieces — host is the compose
      # service name `postgres`, reachable on the internal network only.
      # sslmode=disable is correct: the link is container↔container, never WAN.
      TELA_DATABASE_URL: postgres://${TELA_PG_USER:-tela}:${TELA_PG_PASSWORD}@postgres:5432/${TELA_PG_DB:-tela}?sslmode=disable
      # #3 PDF export. The backend POSTs to gotenberg, which renders the reader
      # via the INTERNAL proxy origin (never the CF-fronted public URL) so PDF
      # generation skips the CDN entirely.
      TELA_GOTENBERG_URL:        ${TELA_GOTENBERG_URL:-http://gotenberg:3000}
      TELA_PDF_RENDER_BASE_URL:  ${TELA_PDF_RENDER_BASE_URL:-http://proxy}
      # Deck render sidecar — Slidev markdown → slide images / PDF. The backend
      # proxies it; deck pages render here. See deck/.
      TELA_DECK_URL:             ${TELA_DECK_URL:-http://deck:3344}
      # Bootstrap admin (first boot only; TELA_ADMIN_EMAIL also backfills later).
      TELA_ADMIN_USERNAME:  ${TELA_ADMIN_USERNAME:-}
      TELA_ADMIN_PASSWORD:  ${TELA_ADMIN_PASSWORD:-}
      TELA_ADMIN_EMAIL:     ${TELA_ADMIN_EMAIL:-}
      # Transactional email (self-registration confirm + password reset).
      # Unset TELA_SMTP_HOST → emails are logged, not sent.
      TELA_SMTP_HOST:      ${TELA_SMTP_HOST:-}
      TELA_SMTP_PORT:      ${TELA_SMTP_PORT:-}
      TELA_SMTP_TLS:       ${TELA_SMTP_TLS:-}
      TELA_SMTP_USERNAME:  ${TELA_SMTP_USERNAME:-}
      TELA_SMTP_PASSWORD:  ${TELA_SMTP_PASSWORD:-}
      TELA_SMTP_FROM:      ${TELA_SMTP_FROM:-}
      # RAG semantic retrieval (internal/rag). Unset → feature is dark
      # (/api/rag/* return 503). The embed host must be reachable from THIS
      # container's network. If it's on a private overlay network resolved by
      # NAME, the name may not resolve inside the container — use its IP then.
      TELA_RAG_EMBED_URL:    ${TELA_RAG_EMBED_URL:-}
      TELA_RAG_EMBED_MODEL:  ${TELA_RAG_EMBED_MODEL:-}
      TELA_RAG_EMBED_DIM:    ${TELA_RAG_EMBED_DIM:-}
      TELA_RAG_EMBED_TOKEN:    ${TELA_RAG_EMBED_TOKEN:-}
      TELA_RAG_QUERY_INSTRUCT: ${TELA_RAG_QUERY_INSTRUCT:-}
      # Optional rerank tier + Ask-query logging (internal/rag).
      TELA_RAG_RERANK_URL:    ${TELA_RAG_RERANK_URL:-}
      TELA_RAG_RERANK_MODEL:  ${TELA_RAG_RERANK_MODEL:-}
      TELA_RAG_RERANK_TOKEN:  ${TELA_RAG_RERANK_TOKEN:-}
      TELA_RAG_LOG_ASKS:      ${TELA_RAG_LOG_ASKS:-}
      # Managed AI / "ask your docs" (internal/llm). Unset → /api/rag/ask 503s.
      # OpenAI-compatible base incl. /v1; a remote Ollama's /v1 or any provider.
      TELA_LLM_URL:    ${TELA_LLM_URL:-}
      TELA_LLM_MODEL:  ${TELA_LLM_MODEL:-}
      TELA_LLM_TOKEN:  ${TELA_LLM_TOKEN:-}
      # Completion length cap (0/unset → in-code default 1024). Raise for long
      # table/enumeration answers that otherwise truncate mid-stream.
      TELA_LLM_MAX_TOKENS: ${TELA_LLM_MAX_TOKENS:-}
      # Optional deep-link from the admin AI-reliability card to the Grafana
      # failover dashboard. Unset → no link shown.
      TELA_GRAFANA_AI_URL: ${TELA_GRAFANA_AI_URL:-}
      # Deck image generation (MCP generate_deck_image). OpenAI-compatible Images
      # endpoint incl. /v1 (e.g. an mflux/FLUX box). Unset → the tool 503s. From a
      # Docker backend use the host's overlay IP, not its name (RAG-embed gotcha).
      TELA_IMAGE_GEN_URL:    ${TELA_IMAGE_GEN_URL:-}
      TELA_IMAGE_GEN_MODEL:  ${TELA_IMAGE_GEN_MODEL:-}
      TELA_IMAGE_GEN_KEY:    ${TELA_IMAGE_GEN_KEY:-}
      # Self-serve billing (Polar, internal/billing). Unset TOKEN/SECRET → billing
      # is dark (checkout/portal 503; plans stay operator-assigned). PRODUCTS maps
      # tela plan keys to Polar product UUIDs: "personal_plus:<uuid>,org_team:<uuid>".
      TELA_POLAR_TOKEN:          ${TELA_POLAR_TOKEN:-}
      TELA_POLAR_WEBHOOK_SECRET: ${TELA_POLAR_WEBHOOK_SECRET:-}
      TELA_POLAR_BASE_URL:       ${TELA_POLAR_BASE_URL:-}
      TELA_POLAR_PRODUCTS:       ${TELA_POLAR_PRODUCTS:-}
      # MCP OAuth (Phase 5). Unset → /api/mcp stays PAT-only and OAuth is dark
      # (Protected Resource Metadata 404s). Set TELA_WORKOS_ISSUER to enable the
      # Claude.ai/ChatGPT Connect flow via WorkOS AuthKit. See .env.example.
      TELA_WORKOS_ISSUER:    ${TELA_WORKOS_ISSUER:-}
      TELA_MCP_RESOURCE:     ${TELA_MCP_RESOURCE:-}
      WORKOS_API_KEY:        ${WORKOS_API_KEY:-}
      # Federated sign-in (sso.go). Each provider is dark until BOTH its vars are
      # set; redirect URI is <TELA_PUBLIC_BASE_URL>/api/auth/sso/<provider>/callback.
      # Per-org OIDC SSO is configured at runtime (PUT /api/orgs/{id}/sso), not here.
      TELA_SSO_GOOGLE_CLIENT_ID:        ${TELA_SSO_GOOGLE_CLIENT_ID:-}
      TELA_SSO_GOOGLE_CLIENT_SECRET:    ${TELA_SSO_GOOGLE_CLIENT_SECRET:-}
      TELA_SSO_MICROSOFT_CLIENT_ID:     ${TELA_SSO_MICROSOFT_CLIENT_ID:-}
      TELA_SSO_MICROSOFT_CLIENT_SECRET: ${TELA_SSO_MICROSOFT_CLIENT_SECRET:-}
      TELA_SSO_GITHUB_CLIENT_ID:        ${TELA_SSO_GITHUB_CLIENT_ID:-}
      TELA_SSO_GITHUB_CLIENT_SECRET:    ${TELA_SSO_GITHUB_CLIENT_SECRET:-}
      # WebDAV sync surface (docs/webdav-sync.md). Default ON; empty = default.
      TELA_WEBDAV_ENABLED:         ${TELA_WEBDAV_ENABLED:-}
      TELA_WEBDAV_CREATE_SPACES:   ${TELA_WEBDAV_CREATE_SPACES:-}
      TELA_WEBDAV_DELETE_FLOOR:    ${TELA_WEBDAV_DELETE_FLOOR:-}
      TELA_WEBDAV_DELETE_FRACTION: ${TELA_WEBDAV_DELETE_FRACTION:-}
      TELA_WEBDAV_FILE_MAX_BYTES:  ${TELA_WEBDAV_FILE_MAX_BYTES:-}
      # Ops knobs (empty = default).
      TELA_LOG_FORMAT:           ${TELA_LOG_FORMAT:-}
      TELA_API_KEY_AUDIT_DAYS:   ${TELA_API_KEY_AUDIT_DAYS:-}
      TELA_DISABLE_WELCOME_SEED: ${TELA_DISABLE_WELCOME_SEED:-}
    expose:
      - "8080"
    depends_on:
      # Block backend start until Postgres answers pg_isready — migrations run on
      # connect (db.Open), so a not-yet-ready DB would crash-loop the backend.
      postgres:
        condition: service_healthy
      gotenberg:
        condition: service_started
      deck:
        condition: service_started
    restart: unless-stopped

  # Primary datastore. The backend connects via TELA_DATABASE_URL (built from the
  # TELA_PG_* env above) and runs its embedded migrations on first connect — no
  # separate migrate step. Data lives in the named volume tela-pgdata; with the
  # test stack's `-p tela-test` project prefix compose namespaces this volume
  # automatically (tela-test_tela-pgdata), so the test DB is fully isolated.
  postgres:
    # pgvector/pgvector ships the `vector` extension on top of the official
    # postgres:17 image (Debian, not alpine) — RAG's semantic half needs
    # CREATE EXTENSION vector (0002_rag.sql). Same PG major as before, so the
    # existing pgdata volume is reused without a dump/restore.
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER:     ${TELA_PG_USER:-tela}
      POSTGRES_PASSWORD: ${TELA_PG_PASSWORD}
      POSTGRES_DB:       ${TELA_PG_DB:-tela}
    volumes:
      - tela-pgdata:/var/lib/postgresql/data
    healthcheck:
      # pg_isready against the configured role/db — `up -d --wait` and the
      # backend's depends_on both gate on this returning 0.
      test: ["CMD-SHELL", "pg_isready -U ${TELA_PG_USER:-tela} -d ${TELA_PG_DB:-tela}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  # #3 PDF export engine — headless-Chromium HTML→PDF. Internal only (no
  # published port); reached by the backend at http://gotenberg:3000 and renders
  # the reader by loading http://proxy/print|share/… on the compose network.
  gotenberg:
    image: gotenberg/gotenberg:8
    expose:
      - "3000"
    restart: unless-stopped

  # Deck render sidecar — Slidev markdown → per-slide PNGs (Present) + PDF/PPTX
  # (export). Internal only; the backend POSTs to it at http://deck:3344.
  # SECURITY: it compiles deck markdown (Vue/Vite), so treat as untrusted-code
  # execution — a follow-up isolates it on its own egress-locked network (needs
  # self-hosted theme fonts first). For now it shares the compose network.
  deck:
    build:
      context: ../deck
    expose:
      - "3344"
    volumes:
      - tela-deckcache:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3344/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    expose:
      - "80"
    restart: unless-stopped

  proxy:
    # Built from deploy/proxy/Dockerfile (repo-root context) which bakes the
    # static marketing landing into the image — so `make up` needs only Docker,
    # not a host Node toolchain. Caddy serves the landing at the apex from the
    # baked /srv/landing; the Caddyfile stays bind-mounted so config tweaks don't
    # need an image rebuild.
    build:
      context: ..
      dockerfile: deploy/proxy/Dockerfile
    ports:
      - "8780:80"
      # Direct TLS (no external terminator): set TELA_SITE_ADDRESS=your.domain in
      # .env, then publish 80 + 443 (uncomment) so Caddy can run the ACME HTTP
      # challenge and serve HTTPS. Leave commented when behind Cloudflare/an LB.
      # Org custom domains REQUIRE this direct-TLS mode (Caddy on-demand-issues
      # their certs); behind Cloudflare on-demand never fires. See docs/custom-domains.md.
      # - "80:80"
      # - "443:443"
    environment:
      # Passed through from .env; empty → Caddyfile default of :80. For org
      # custom domains set it to the canonical host (direct-TLS mode).
      - TELA_SITE_ADDRESS
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      # sites.caddy holds the actual routing (imported by Caddyfile); a shared
      # edge imports the same file, so there's one source of truth for both.
      - ./proxy/sites.caddy:/etc/caddy/sites.caddy:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # Optional self-hosted embedder for RAG / semantic search. Off by default;
  # start it with `docker compose --profile embed up -d`. Then set
  # TELA_RAG_EMBED_URL=http://ollama:11434 in .env and pull the model:
  # `docker compose exec ollama ollama pull qwen3-embedding:0.6b`.
  # Without this, full-text search still works; only semantic search is dark.
  ollama:
    image: ollama/ollama:latest
    profiles: ["embed"]
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  tela-pgdata:
  caddy-data:
  caddy-config:
  ollama-data:
  tela-deckcache:
