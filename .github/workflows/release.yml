# Publishes public multi-arch images to GHCR on a version tag, so tela can be
# installed from one-click app stores (Umbrel/CasaOS/Render/DO/Portainer/…).
# Tag a release (e.g. `git tag v0.7.0 && git push origin v0.7.0`) → this builds
# and pushes ghcr.io/zcag/tela-{backend,frontend,deck,proxy}:<version> + :latest
# for linux/amd64 + linux/arm64. Or trigger manually with an explicit version.
name: Release images

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v0.7.0)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            file: backend/Dockerfile
          - name: frontend
            context: frontend
            file: frontend/Dockerfile
          - name: deck
            context: deck
            file: deck/Dockerfile
          - name: proxy
            context: .
            file: deploy/proxy/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME}"
          fi
          echo "version=${V#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/zcag/tela-${{ matrix.name }}:${{ steps.ver.outputs.version }}
            ghcr.io/zcag/tela-${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
