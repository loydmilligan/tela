server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite emits content-hashed filenames under /assets — the bytes for a given
    # URL never change, so cache hard and skip revalidation on repeat visits.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Everything else (the SPA shell + client-routed paths) resolves to
    # index.html. Never serve it without revalidation, or clients — notably
    # iPad Safari — keep a stale shell and never load a new deploy's hashed
    # bundle. no-cache = store but revalidate via ETag (304 when unchanged).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
