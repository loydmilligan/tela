server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite emits content-hashed filenames under /assets — the bytes for a given
    # URL never change, so cache hard and skip revalidation on repeat visits.
    # `^~` so this prefix beats the handle regex below (which is otherwise a
    # higher-priority match type) and keeps the immutable cache header.
    location ^~ /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # The bare app entry ("/", routed here by Caddy for a signed-in user).
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }

    # Known client-routed sections → SPA shell (HTTP 200). Mirror of the
    # top-level routes in src/routes/router.tsx — keep in sync when a new
    # top-level route is added, or that path will 404. Note: a missing resource
    # *within* a known section (e.g. /spaces/{bad-id}) still renders the SPA's
    # notFound UI client-side with a 200 (a soft-404 — unavoidable without SSR);
    # this block only fixes genuinely-unknown top-level paths below.
    location ~ ^/(login|register|verify-email|forgot-password|reset-password|settings|spaces|share|read|print|search|shared|graph|n|public|u|discover|ask)(/|$) {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    # Unified GitHub-style handle URLs: /{handle} and /{handle}/{space-slug} —
    # a user/org public home or a public space. Handle-shaped (slug chars incl.
    # dots, e.g. gulden.gullu), one or two segments → serve the SPA (200) so the
    # client resolves the handle; a real file at that path (favicon.svg, …) still
    # wins via `try_files $uri`. Genuinely junk paths fall through to the real
    # 404 below. Defined AFTER the known-routes allowlist so app routes win.
    location ~ ^/[A-Za-z0-9][A-Za-z0-9._-]*(/[A-Za-z0-9][A-Za-z0-9._-]*)?$ {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    # Everything else is a genuinely unknown path: serve a real static file if
    # one exists, otherwise a REAL 404. The 404 body is the SPA shell (see
    # error_page below), so humans still get the branded "Page not found" page
    # while crawlers / uptime monitors see the 404 status — no more soft-404
    # 200 shells for scanner noise and dead URLs.
    location / {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # Serve the SPA shell as the 404 body. No "=code" modifier, so nginx
    # PRESERVES the original 404 status (only the body is swapped in).
    error_page 404 @spa_notfound;
    location @spa_notfound {
        internal;
        add_header Cache-Control "no-cache" always;
        try_files /index.html =404;
    }
}
